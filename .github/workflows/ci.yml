name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python3 -m py_compile agent_cli_audit.py agent_cli_upgrade.py gui.py

      - name: Audit help
        run: python3 agent_cli_audit.py --help

      - name: Upgrade help
        run: python3 agent_cli_upgrade.py --help

      - name: Offline audit smoke test
        run: python3 agent_cli_audit.py --offline --json
